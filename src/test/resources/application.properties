spring.datasource.url=jdbc:h2:mem:devscribe_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

devscribe.security.jwt.secret=test-secret-key-that-is-long-enough-for-jwt-signing-123456
devscribe.security.jwt.expiration-ms=3600000
